<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>テストアンケート｜レコルダ</title>
  <style>
    :root{--ink:#16332d;--green:#24705d;--pale:#eef5f0;--line:#c9ddd3;--red:#a33b32}
    *{box-sizing:border-box}body{margin:0;background:var(--pale);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;line-height:1.7}
    main{max-width:720px;margin:auto;padding:44px 18px 80px}.brand{color:var(--green);font-weight:700;letter-spacing:.18em}
    h1{font-size:clamp(25px,6vw,38px);line-height:1.4}.intro{color:#527069}.meta{display:flex;gap:10px;flex-wrap:wrap;margin:22px 0}.meta span{background:#fff;border:1px solid var(--line);border-radius:999px;padding:5px 13px;font-size:13px}
    form{background:#fff;border:1px solid var(--line);border-radius:16px;padding:clamp(22px,5vw,40px)}
    fieldset{border:0;padding:0;margin:0 0 32px}legend{font-weight:700;margin-bottom:12px}.required{color:var(--red);font-size:12px;margin-left:6px}
    label.option{display:block;border:1px solid var(--line);border-radius:9px;padding:11px 13px;margin:8px 0;cursor:pointer}input{margin-right:8px}
    textarea{width:100%;min-height:120px;border:1px solid #adc2b8;border-radius:9px;padding:12px;font:inherit}
    button{width:100%;border:0;border-radius:9px;background:var(--green);color:#fff;padding:15px;font:700 16px inherit;cursor:pointer}button:disabled{opacity:.55}
    .note{font-size:13px;color:#607a73;background:var(--pale);padding:13px;border-radius:8px}.error{color:var(--red)}
    #result{display:none;background:#fff;border-radius:16px;padding:36px;text-align:center}
  </style>
</head>
<body>
<main>
  <div class="brand">レコルダ</div>
  <h1 id="surveyTitle">LINEとアンケートに関する<br>テスト調査</h1>
  <p class="intro" id="surveyIntro">今後のアンケートを、答えやすく安心できるものにするための短いテストです。</p>
  <div class="meta" id="surveyMeta"><span>所要時間 約2分</span><span>全5問</span><span>テストのため謝礼なし</span></div>
  <form id="survey">
    <input type="hidden" name="survey_token" id="surveyToken">
    <input type="hidden" name="survey_id" id="surveyId" value="line-pilot-2026-07">
    <fieldset>
      <legend>1. 京都との関わりを教えてください<span class="required">必須</span></legend>
      <label class="option"><input type="radio" name="kyoto_relation" value="resident" required>京都府在住</label>
      <label class="option"><input type="radio" name="kyoto_relation" value="commuter">通勤・通学している</label>
      <label class="option"><input type="radio" name="kyoto_relation" value="visitor">観光・買い物などで訪れる</label>
      <label class="option"><input type="radio" name="kyoto_relation" value="none">特に関わりはない</label>
    </fieldset>
    <fieldset>
      <legend>2. LINE公式アカウントを利用する頻度<span class="required">必須</span></legend>
      <label class="option"><input type="radio" name="line_frequency" value="weekly" required>週1回以上</label>
      <label class="option"><input type="radio" name="line_frequency" value="monthly">月1〜3回</label>
      <label class="option"><input type="radio" name="line_frequency" value="rarely">ほとんど使わない</label>
    </fieldset>
    <fieldset>
      <legend>3. 参加しやすいアンケートの長さ<span class="required">必須</span></legend>
      <label class="option"><input type="radio" name="preferred_length" value="3min" required>3分以内</label>
      <label class="option"><input type="radio" name="preferred_length" value="5min">5分以内</label>
      <label class="option"><input type="radio" name="preferred_length" value="10min">10分以内</label>
    </fieldset>
    <fieldset>
      <legend>4. 興味のあるテーマ（複数選択可）</legend>
      <label class="option"><input type="checkbox" name="topics" value="tourism">京都観光・地域</label>
      <label class="option"><input type="checkbox" name="topics" value="food">飲食店・買い物</label>
      <label class="option"><input type="checkbox" name="topics" value="digital">デジタルサービス・AI</label>
      <label class="option"><input type="checkbox" name="topics" value="lifestyle">暮らし・働き方</label>
    </fieldset>
    <fieldset>
      <legend>5. アンケートへの要望があれば教えてください</legend>
      <textarea name="comment" maxlength="500" placeholder="任意・500文字まで"></textarea>
    </fieldset>
    <p class="note" id="surveyNote">回答はテスト運用とサービス改善に使用します。個人を特定する形で公表しません。</p>
    <p id="error" class="error" role="alert"></p>
    <button id="submit" type="submit">回答を送信する</button>
  </form>
  <section id="result"><h2>回答を受け付けました</h2><p id="resultMessage">テストへのご協力、ありがとうございました。</p></section>
</main>
<script>
  const params = new URLSearchParams(location.search);
  const token = params.get('token') || '';
  const paidSurveyId = 'line-paid-pilot-2026-07';
  const isPaidPilot = params.get('survey') === paidSurveyId;
  document.querySelector('#surveyToken').value = token;
  if (isPaidPilot) {
    document.title = '300ポイント謝礼付きアンケート｜レコルダ';
    document.querySelector('#surveyId').value = paidSurveyId;
    document.querySelector('#surveyTitle').innerHTML = '300ポイント謝礼付き<br>テスト調査';
    document.querySelector('#surveyIntro').textContent = '回答しやすさを確認するための、20名限定の短いアンケートです。';
    document.querySelector('#surveyMeta').innerHTML = '<span>所要時間 約2分</span><span>全5問</span><span>先着20名</span><span>完了で300ポイント</span>';
    document.querySelector('#surveyNote').textContent = '回答完了後に300ポイントを付与します。300ポイントは300円相当のPayPay受け取りリンクまたは代替デジタルギフトへ交換できます。回答は任意です。';
    document.querySelector('#resultMessage').textContent = '300ポイントを付与しました。デジタルギフトのご案内をお待ちください。';
  }
  const form = document.querySelector('#survey');
  form.addEventListener('submit', async event => {
    event.preventDefault();
    const button = document.querySelector('#submit');
    const error = document.querySelector('#error');
    button.disabled = true; error.textContent = '';
    const data = new FormData(form);
    const body = {
      survey_token: data.get('survey_token'),
      survey_id: data.get('survey_id'),
      kyoto_relation: data.get('kyoto_relation'),
      line_frequency: data.get('line_frequency'),
      preferred_length: data.get('preferred_length'),
      topics: data.getAll('topics'),
      comment: String(data.get('comment') || '').trim()
    };
    try {
      const response = await fetch('/api/survey-submit', {method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(body)});
      const result = await response.json();
      if (!response.ok) throw new Error(result.error || '送信できませんでした');
      form.style.display='none'; document.querySelector('#result').style.display='block';
    } catch (e) { error.textContent=e.message; button.disabled=false; }
  });
</script>
</body>
</html>
