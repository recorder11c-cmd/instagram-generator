<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>レコルダ｜登録フォーム</title>
  <style>
    :root{--ink:#16332d;--green:#24705d;--pale:#eef5f0;--line:#ccdcd4;--red:#a33b32}
    *{box-sizing:border-box} body{margin:0;background:var(--pale);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;line-height:1.7}
    main{max-width:680px;margin:0 auto;padding:48px 20px 80px}
    .brand{font:600 14px Georgia,serif;letter-spacing:.18em;color:var(--green)}
    h1{font-size:clamp(25px,6vw,38px);line-height:1.35;margin:12px 0}.lead{color:#527069;margin-bottom:32px}
    form{background:#fff;border:1px solid var(--line);border-radius:16px;padding:clamp(22px,5vw,40px);box-shadow:0 12px 40px #15372d10}
    label,legend{display:block;font-weight:700;font-size:14px;margin:0 0 8px}
    .field{margin-bottom:22px} input,select{width:100%;padding:13px 14px;border:1px solid #adc2b8;border-radius:8px;background:#fff;font:inherit}
    input:focus,select:focus{outline:3px solid #62a78f33;border-color:var(--green)}
    fieldset{border:0;padding:0;margin:0 0 22px}.choice{display:flex;gap:12px}.choice label{flex:1;border:1px solid var(--line);border-radius:8px;padding:12px;font-weight:500}
    .choice input,.agree input{width:auto;margin-right:7px}.agree{display:flex;align-items:flex-start;font-size:13px;font-weight:500;background:var(--pale);padding:14px;border-radius:8px}
    button{width:100%;border:0;border-radius:9px;background:var(--green);color:#fff;padding:15px;font:700 16px inherit;cursor:pointer}
    button:disabled{opacity:.55;cursor:wait}.note{font-size:12px;color:#607a73}.error{color:var(--red)} #result{display:none;background:#fff;border-radius:16px;padding:36px;text-align:center}
    .hp{position:absolute;left:-9999px}
  </style>
</head>
<body>
<main>
  <div class="brand">レコルダ</div>
  <h1>声を、次の改善につなげる。</h1>
  <p class="lead">ご関心のある内容を登録してください。必要な情報だけを、わかりやすくお届けします。</p>
  <form id="form">
    <input type="hidden" name="registration_token" id="registrationToken">
    <div class="hp"><label>入力しないでください<input name="website" tabindex="-1" autocomplete="off"></label></div>
    <div class="field"><label for="name">お名前</label><input id="name" name="name" maxlength="80" autocomplete="name" required></div>
    <div class="field"><label for="email">メールアドレス</label><input id="email" name="email" type="email" maxlength="200" autocomplete="email" required></div>
    <div class="field"><label for="area">お住まいの地域</label><select id="area" name="area" required><option value="">選択してください</option><option>京都府</option><option>大阪府</option><option>滋賀県</option><option>その他の近畿</option><option>近畿以外</option></select></div>
    <div class="field">
      <label for="age_group">年代（任意）</label>
      <select id="age_group" name="age_group">
        <option value="">選択しない</option>
        <option>10代</option><option>20代</option><option>30代</option><option>40代</option><option>50代</option><option>60代以上</option><option>回答しない</option>
      </select>
    </div>
    <div class="field">
      <label for="gender">性別（任意）</label>
      <select id="gender" name="gender">
        <option value="">選択しない</option>
        <option>女性</option><option>男性</option><option>その他</option><option>回答しない</option>
      </select>
    </div>
    <div class="field">
      <label for="occupation">職業（任意）</label>
      <select id="occupation" name="occupation">
        <option value="">選択しない</option>
        <option>会社員</option><option>自営業・フリーランス</option><option>会社役員・経営者</option><option>パート・アルバイト</option><option>学生</option><option>主婦・主夫</option><option>無職・休職中</option><option>その他</option><option>回答しない</option>
      </select>
    </div>
    <p class="note">年代・性別・職業は任意です。回答結果を匿名で集計し、より良いレポート作成の参考にします。個人が特定される形では利用しません。</p>
    <fieldset><legend>ご関心のある内容</legend><div class="choice">
      <label><input type="radio" name="segment" value="monitor" required>アンケートモニター</label>
      <label><input type="radio" name="segment" value="business" required>業務改善・AI導入</label>
    </div></fieldset>
    <label class="agree"><input type="checkbox" name="consent" required><span>登録内容を、選択した情報の配信・連絡・サービス改善に利用すること、および<a href="/recorda/privacy.html" target="_blank">プライバシーポリシー</a>に同意します。配信停止・削除はいつでも申請できます。</span></label>
    <p class="note">同意日時と同意文面の版を記録します。受託業務で取得した名簿とは完全に分離して管理します。</p>
    <p id="error" class="error" role="alert"></p>
    <button id="submit" type="submit">同意して登録する</button>
  </form>
  <section id="result"><h2>登録が完了しました</h2><p>ありがとうございます。LINEにもご案内をお送りしました。</p></section>
</main>
<script>
  const params = new URLSearchParams(location.search);
  document.querySelector('#registrationToken').value = params.get('token') || '';
  const form = document.querySelector('#form');
  form.addEventListener('submit', async (event) => {
    event.preventDefault();
    const button = document.querySelector('#submit');
    const error = document.querySelector('#error');
    button.disabled = true; error.textContent = '';
    const body = Object.fromEntries(new FormData(form));
    body.consent = body.consent === 'on';
    try {
      const response = await fetch('/api/monitor-register', {method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(body)});
      const data = await response.json();
      if (!response.ok) throw new Error(data.error || '登録できませんでした');
      form.style.display = 'none'; document.querySelector('#result').style.display = 'block';
    } catch (e) { error.textContent = e.message; button.disabled = false; }
  });
</script>
</body>
</html>
